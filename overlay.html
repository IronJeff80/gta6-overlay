<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTA 6 Overlay</title>
    <style>
        /* =========================================
           FONTS
           ========================================= */
        @font-face {
            font-family: 'Mesmerize';
            src: url('mesmerize.seeb-regular.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            /* =========================================
               🎨 THE COMMAND CENTER
               ========================================= */
            
            /* TIMING SETTINGS */
            --phase1-duration: 4s;  
            --phase2-duration: 3s;  
            --phase3-duration: 3s;  
            --hold-duration: 4s;     
            --hide-duration: 1.5s;   
            
            /* DYNAMIC TEXT VARIABLES (Controlled by JS) */
            --font-family: 'Mesmerize', 'Arial Black', Impact, sans-serif;
            --font-size: 1000px; /* Starting Default */         
            --letter-spacing: 0.04em;   
            --stroke-scale: 1.666; /* Base scale for 1000px font */
        }

        /* OBS Transparent Background */
        body {
            margin: 0;
            overflow: hidden;
            background-color: transparent; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            perspective: 1000px; 
        }

        /* THE FLY-THROUGH HIDE ANIMATION */
        svg {
            overflow: visible; /* Prevents glow clipping on edges */
            transform-origin: center center;
            
            animation: flyPastCamera var(--hide-duration) cubic-bezier(0.5, 0, 0.2, 1) forwards;
            animation-delay: calc(var(--phase1-duration) + var(--phase2-duration) + var(--phase3-duration) + var(--hold-duration));
        }

        @keyframes flyPastCamera {
            0% { transform: scale(1); opacity: 1; }
            60% { opacity: 1; }
            100% { transform: scale(40); opacity: 0; }
        }

        /* Shared Text Properties */
        .text-base {
            font-family: var(--font-family);
            font-size: var(--font-size); 
            font-weight: 900;
            letter-spacing: var(--letter-spacing);
            
            /* NATIVE SVG CENTERING */
            dominant-baseline: central;
            text-anchor: middle;
            
            stroke-linejoin: miter;
            stroke-miterlimit: 4; 
        }

        /* =========================================
           PHASE 1: VOLUMETRIC LIGHT RAYS 
           ========================================= */
        .ray-base {
            fill: transparent;
            stroke: url(#gta6-gradient);
        }
        .ray-wrapper { mix-blend-mode: screen; }
        .wrapper-5 { filter: blur(45px); opacity: 0.15; }
        .wrapper-4 { filter: blur(25px); opacity: 0.25; }
        .wrapper-3 { filter: blur(12px); opacity: 0.4; }
        .wrapper-2 { filter: blur(6px); opacity: 0.7; }
        .wrapper-1 { filter: blur(2px); opacity: 0.9; }

        /* Strokes scale dynamically with the text size */
        .ray-5 { stroke-width: calc(160px * var(--stroke-scale)); }
        .ray-4 { stroke-width: calc(100px * var(--stroke-scale)); }
        .ray-3 { stroke-width: calc(50px * var(--stroke-scale)); }
        .ray-2 { stroke-width: calc(24px * var(--stroke-scale)); }
        .ray-1 { stroke-width: calc(12px * var(--stroke-scale)); }

        .blocker-style {
            fill: black;
            stroke: black;
            stroke-width: calc(26px * var(--stroke-scale)); 
        }

        /* =========================================
           PHASE 2 & 3: LAYER SIZING & ANIMATIONS
           ========================================= */
        .gta-front-layer {
            fill: #130024; 
            stroke: #130024;
            stroke-width: calc(28px * var(--stroke-scale)); 
        }

        .phase2-fill {
            fill: url(#p2-fill-grad);
            stroke-width: 0px; 
        }

        .phase3-palms {
            fill: url(#palm-pattern);
            opacity: 0; 
            mix-blend-mode: multiply; 
        }

        .phase2-grad-stroke {
            fill: transparent;
            stroke: url(#p2-stroke-grad);
            stroke-width: calc(20px * var(--stroke-scale)); 
            opacity: 0;
            animation: fadeIn var(--phase2-duration) ease-in-out forwards;
            animation-delay: var(--phase1-duration); 
        }

        .phase2-white-stroke {
            fill: transparent;
            stroke: white;
            stroke-width: calc(8px * var(--stroke-scale)); 
            opacity: 0;
            animation: fadeIn var(--phase2-duration) ease-in-out forwards;
            animation-delay: var(--phase1-duration); 
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <svg id="main-svg" xmlns:xlink="http://www.w3.org/1999/xlink">
        <defs>
            <linearGradient id="gta6-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#c800ff" />
                <stop offset="50%" stop-color="#ffb300" />
                <stop offset="100%" stop-color="#c800ff" />
            </linearGradient>

            <linearGradient id="p2-stroke-grad" gradientUnits="objectBoundingBox" x1="0" y1="1" x2="0" y2="0">
                <stop offset="0%" stop-color="#790078" />
                <stop offset="100%" stop-color="#3e0062" />
            </linearGradient>

            <linearGradient id="p2-fill-grad" gradientUnits="objectBoundingBox" x1="0" y1="0" x2="0" y2="1">
                <stop id="stop-1" offset="0%"   stop-color="#3e0062" /> 
                <stop id="stop-2" offset="20%"  stop-color="#f465bf" /> 
                <stop id="stop-3" offset="50%"  stop-color="#f465bf" /> 
                <stop id="stop-4" offset="100%" stop-color="#f465bf" /> 
            </linearGradient>

            <pattern id="palm-pattern" width="100%" height="100%" patternContentUnits="objectBoundingBox">
                <image id="palm-img" href="palms.png" xlink:href="palms.png" x="0" y="0" width="1" height="1" preserveAspectRatio="xMidYMid slice" />
            </pattern>

            <linearGradient id="mask-grad" x1="0" y1="-10%" x2="0" y2="0%" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="white" />
                <stop offset="100%" stop-color="black" />
            </linearGradient>
            
            <mask id="reveal-mask">
                <rect x="-5000" y="-5000" width="10000" height="10000" fill="url(#mask-grad)" />
            </mask>

            <linearGradient id="bloom-wipe-grad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="black" />
                <stop offset="30%" stop-color="white" />
                <stop offset="100%" stop-color="white" />
            </linearGradient>
            
            <mask id="fill-wipe-mask">
                <rect id="fill-wipe-rect" x="-5000" y="5000" width="10000" height="5000" fill="url(#bloom-wipe-grad)" />
            </mask>

            <mask id="block-inner">
                <rect x="-5000" y="-5000" width="10000" height="10000" fill="white" />
                <text x="50%" y="50%" class="text-base blocker-style auto-text"></text>
            </mask>
        </defs>
        
        <g class="light-burst" mask="url(#block-inner)">
            <g class="ray-wrapper wrapper-5"><text x="50%" y="50%" class="text-base ray-base ray-5 auto-text" mask="url(#reveal-mask)"></text></g>
            <g class="ray-wrapper wrapper-4"><text x="50%" y="50%" class="text-base ray-base ray-4 auto-text" mask="url(#reveal-mask)"></text></g>
            <g class="ray-wrapper wrapper-3"><text x="50%" y="50%" class="text-base ray-base ray-3 auto-text" mask="url(#reveal-mask)"></text></g>
            <g class="ray-wrapper wrapper-2"><text x="50%" y="50%" class="text-base ray-base ray-2 auto-text" mask="url(#reveal-mask)"></text></g>
            <g class="ray-wrapper wrapper-1"><text x="50%" y="50%" class="text-base ray-base ray-1 auto-text" mask="url(#reveal-mask)"></text></g>
        </g>
        
        <g mask="url(#reveal-mask)">
            <text x="50%" y="50%" class="text-base gta-front-layer auto-text"></text>
            
            <g mask="url(#fill-wipe-mask)">
                <text x="50%" y="50%" class="text-base phase2-fill auto-text"></text>
                <text x="50%" y="50%" class="text-base phase3-palms auto-text"></text>
            </g>

            <text x="50%" y="50%" class="text-base phase2-grad-stroke auto-text"></text>
            <text x="50%" y="50%" class="text-base phase2-white-stroke auto-text"></text>
        </g>
    </svg>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Read URL Parameters from index.html
            const urlParams = new URLSearchParams(window.location.search);
            const userText = urlParams.get('text') || "BIG\nCAT";
            const canvasW = parseInt(urlParams.get('w')) || 1920;
            const canvasH = parseInt(urlParams.get('h')) || 1080;
            
            // Apply canvas dimensions to SVG
            const svg = document.getElementById('main-svg');
            svg.setAttribute('viewBox', `0 0 ${canvasW} ${canvasH}`);
            svg.style.width = `${canvasW}px`;
            svg.style.height = `${canvasH}px`;

            // Calculate "Safe Zone" dynamically based on the requested canvas size
            // (Roughly mimics the 1600x1000 safe area for a 1920x1080 canvas)
            const textSettings = {
                content: userText, 
                lineHeightEm: 0.84, 
                maxWidth: canvasW * (1600 / 1920),    
                maxHeight: canvasH * (900 / 1080),
                defaultSize: 1000 
            };

            document.fonts.ready.then(() => {
                const lines = textSettings.content.split('\n');
                const textElements = document.querySelectorAll('.auto-text');
                const root = document.documentElement;

                // 1. Create a hidden HTML Ruler to safely measure text dimensions 
                // This circumvents OBS's SVG measurement bugs entirely.
                const ruler = document.createElement('div');
                ruler.style.position = 'absolute';
                ruler.style.visibility = 'hidden';
                ruler.style.whiteSpace = 'pre';
                ruler.style.fontFamily = "'Mesmerize', 'Arial Black', Impact, sans-serif";
                ruler.style.fontSize = `${textSettings.defaultSize}px`;
                ruler.style.fontWeight = '900';
                ruler.style.letterSpacing = '0.04em';
                ruler.style.lineHeight = textSettings.lineHeightEm;
                
                // Add the text lines to the ruler
                ruler.innerHTML = lines.join('<br>');
                document.body.appendChild(ruler);

                // Wait 1 frame for the DOM to calculate the ruler's size
                requestAnimationFrame(() => {
                    const rulerWidth = ruler.offsetWidth;
                    const rulerHeight = ruler.offsetHeight;
                    
                    // 2. Math Calculation: Defaults to 1000px. 
                    // ONLY scales down if the width exceeds the safe max width or height.
                    const scaleX = textSettings.maxWidth / rulerWidth;
                    const scaleY = textSettings.maxHeight / rulerHeight;
                    
                    // Math.min with 1 ensures it never scales *up* past the default 1000px size.
                    const finalScale = Math.min(1, scaleX, scaleY);
                    
                    const finalFontSize = textSettings.defaultSize * finalScale;
                    const strokeScale = finalFontSize / 600; 
                    
                    // 3. Apply to CSS Roots
                    root.style.setProperty('--font-size', `${finalFontSize}px`);
                    root.style.setProperty('--stroke-scale', strokeScale);
                    
                    // Clean up the ruler
                    document.body.removeChild(ruler);

                    // 4. Populate SVG Text Nodes with multi-line support and perfect native centering
                    textElements.forEach(el => {
                        el.innerHTML = ''; 
                        lines.forEach((line, index) => {
                            const tspan = document.createElementNS('http://www.w3.org/2000/svg', 'tspan');
                            tspan.textContent = line;
                            tspan.setAttribute('x', '50%');
                            
                            // Align lines relative to the middle of the text block
                            if (index === 0) {
                                const offsetEm = -((lines.length - 1) * textSettings.lineHeightEm) / 2;
                                tspan.setAttribute('dy', `${offsetEm}em`);
                            } else {
                                tspan.setAttribute('dy', `${textSettings.lineHeightEm}em`);
                            }
                            el.appendChild(tspan);
                        });
                    });

                    // Trigger the animation wipes
                    requestAnimationFrame(() => {
                        initAnimations();
                    });
                });
            });
        });

        function initAnimations() {
            const rootStyles = getComputedStyle(document.documentElement);
            const p1Dur = parseFloat(rootStyles.getPropertyValue('--phase1-duration')); 
            const p2Dur = parseFloat(rootStyles.getPropertyValue('--phase2-duration')); 
            const p3Dur = parseFloat(rootStyles.getPropertyValue('--phase3-duration')); 

            const p2Start = p1Dur;
            const p3Start = p1Dur + p2Dur;

            const createAnim = (attr, from, to, duration, begin, calcMode = 'spline') => {
                const anim = document.createElementNS('http://www.w3.org/2000/svg', 'animate');
                anim.setAttribute('attributeName', attr);
                anim.setAttribute('from', from);
                anim.setAttribute('to', to);
                anim.setAttribute('begin', `${begin}s`);
                anim.setAttribute('dur', `${duration}s`);
                anim.setAttribute('fill', 'freeze');
                anim.setAttribute('calcMode', calcMode);
                if (calcMode === 'spline') {
                    anim.setAttribute('keyTimes', '0; 1');
                    anim.setAttribute('keySplines', '0.4 0 0.2 1'); 
                }
                return anim;
            };

            // PHASE 1: Top-Down Cinematic Wipe (Using percentages to cover any screen size)
            const grad = document.getElementById('mask-grad');
            grad.appendChild(createAnim('y1', '-10%', '110%', p1Dur, 0));
            grad.appendChild(createAnim('y2', '0%', '120%', p1Dur, 0));

            // PHASE 2: Bottom-Up Bloom Wipe spans safely across huge areas to clear the text
            const fillRect = document.getElementById('fill-wipe-rect');
            fillRect.appendChild(createAnim('y', '3000', '-3000', p2Dur, p2Start));

            // PHASE 3: Seamless Color Morph
            document.getElementById('stop-1').appendChild(createAnim('stop-color', '#3e0062', '#296cf1', p3Dur, p3Start, 'linear'));
            document.getElementById('stop-2').appendChild(createAnim('stop-color', '#f465bf', '#776add', p3Dur, p3Start, 'linear'));
            document.getElementById('stop-4').appendChild(createAnim('stop-color', '#f465bf', '#fed04a', p3Dur, p3Start, 'linear'));

            // PHASE 3: Reveal Palms
            document.querySelectorAll('.phase3-palms').forEach(p => {
                p.appendChild(createAnim('opacity', '0', '0.85', p3Dur, p3Start, 'linear'));
            });
        }
    </script>
</body>
</html>
