<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTA 6 Overlay</title>
    <style>
        :root {
            --phase1-duration: 4s;  
            --phase2-duration: 3s;  
            --phase3-duration: 3s;  
            --hold-duration: 4s;     
            --hide-duration: 1.5s;   
            
            --font-family: 'Arial Black', Impact, sans-serif;
            --font-size: 400px;          
            --letter-spacing: 4px;      
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: transparent; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            perspective: 1000px; 
        }

        svg {
            overflow: visible;
            transform-origin: center center;
            animation: flyPastCamera var(--hide-duration) cubic-bezier(0.5, 0, 0.2, 1) forwards;
            animation-delay: calc(var(--phase1-duration) + var(--phase2-duration) + var(--phase3-duration) + var(--hold-duration));
        }

        @keyframes flyPastCamera {
            0% { transform: scale(1); opacity: 1; }
            60% { opacity: 1; }
            100% { transform: scale(40); opacity: 0; }
        }

        .text-base {
            font-family: var(--font-family);
            font-size: var(--font-size); 
            font-weight: 900;
            letter-spacing: var(--letter-spacing);
            dominant-baseline: middle;
            text-anchor: middle;
            stroke-linejoin: miter;
            stroke-miterlimit: 4; 
        }

        .ray-base { fill: transparent; stroke: url(#gta6-gradient); }
        .ray-wrapper { mix-blend-mode: screen; }
        .wrapper-5 { filter: blur(45px); opacity: 0.15; }
        .wrapper-4 { filter: blur(25px); opacity: 0.25; }
        .wrapper-3 { filter: blur(12px); opacity: 0.4; }
        .wrapper-2 { filter: blur(6px); opacity: 0.7; }
        .wrapper-1 { filter: blur(2px); opacity: 0.9; }
        .ray-5 { stroke-width: 160px; }
        .ray-4 { stroke-width: 100px; }
        .ray-3 { stroke-width: 50px; }
        .ray-2 { stroke-width: 24px; }
        .ray-1 { stroke-width: 12px; }

        .blocker-style { fill: black; stroke: black; stroke-width: 26px; }

        .gta-front-layer { fill: #130024; stroke: #130024; stroke-width: 28px; }
        .phase2-fill { fill: url(#p2-fill-grad); stroke-width: 0px; }
        .phase3-palms { fill: url(#palm-pattern); opacity: 0; mix-blend-mode: multiply; }

        .phase2-grad-stroke {
            fill: transparent; stroke: url(#p2-stroke-grad); stroke-width: 20px; 
            opacity: 0;
            animation: fadeIn var(--phase2-duration) ease-in-out forwards;
            animation-delay: var(--phase1-duration); 
        }
        .phase2-white-stroke {
            fill: transparent; stroke: white; stroke-width: 8px; 
            opacity: 0;
            animation: fadeIn var(--phase2-duration) ease-in-out forwards;
            animation-delay: var(--phase1-duration); 
        }

        @keyframes fadeIn { to { opacity: 1; } }
    </style>
</head>
<body>

    <svg id="main-svg" xmlns:xlink="http://www.w3.org/1999/xlink">
        <defs>
            <linearGradient id="gta6-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#c800ff" />
                <stop offset="50%" stop-color="#ffb300" />
                <stop offset="100%" stop-color="#c800ff" />
            </linearGradient>

            <linearGradient id="p2-stroke-grad" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#790078" />
                <stop offset="100%" stop-color="#3e0062" />
            </linearGradient>

            <linearGradient id="p2-fill-grad" gradientUnits="userSpaceOnUse">
                <stop id="stop-1" offset="0%"   stop-color="#3e0062" /> 
                <stop id="stop-2" offset="20%"  stop-color="#f465bf" /> 
                <stop id="stop-3" offset="50%"  stop-color="#f465bf" /> 
                <stop id="stop-4" offset="100%" stop-color="#f465bf" /> 
            </linearGradient>

            <pattern id="palm-pattern" patternUnits="userSpaceOnUse" x="0">
                <image id="palm-img" href="palms.png" xlink:href="palms.png" preserveAspectRatio="xMidYMid slice" />
            </pattern>

            <linearGradient id="mask-grad" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="white" />
                <stop offset="100%" stop-color="black" />
            </linearGradient>
            <mask id="reveal-mask">
                <rect x="-1000" y="-4000" width="6000" height="10000" fill="url(#mask-grad)" />
            </mask>

            <linearGradient id="bloom-wipe-grad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="black" />
                <stop offset="30%" stop-color="white" />
                <stop offset="100%" stop-color="white" />
            </linearGradient>
            <mask id="fill-wipe-mask">
                <rect id="fill-wipe-rect" x="-1000" width="6000" height="4000" fill="url(#bloom-wipe-grad)" />
            </mask>

            <mask id="block-inner">
                <rect x="-1000" y="-4000" width="6000" height="10000" fill="white" />
                <text x="50%" y="50%" class="text-base blocker-style auto-text"></text>
            </mask>
        </defs>
        
        <g class="light-burst" mask="url(#block-inner)">
            <g class="ray-wrapper wrapper-5"><text x="50%" y="50%" class="text-base ray-base ray-5 auto-text" mask="url(#reveal-mask)"></text></g>
            <g class="ray-wrapper wrapper-4"><text x="50%" y="50%" class="text-base ray-base ray-4 auto-text" mask="url(#reveal-mask)"></text></g>
            <g class="ray-wrapper wrapper-3"><text x="50%" y="50%" class="text-base ray-base ray-3 auto-text" mask="url(#reveal-mask)"></text></g>
            <g class="ray-wrapper wrapper-2"><text x="50%" y="50%" class="text-base ray-base ray-2 auto-text" mask="url(#reveal-mask)"></text></g>
            <g class="ray-wrapper wrapper-1"><text x="50%" y="50%" class="text-base ray-base ray-1 auto-text" mask="url(#reveal-mask)"></text></g>
        </g>
        
        <g mask="url(#reveal-mask)">
            <text x="50%" y="50%" class="text-base gta-front-layer auto-text"></text>
            <g mask="url(#fill-wipe-mask)">
                <text x="50%" y="50%" class="text-base phase2-fill auto-text"></text>
                <text x="50%" y="50%" class="text-base phase3-palms auto-text"></text>
            </g>
            <text x="50%" y="50%" class="text-base phase2-grad-stroke auto-text"></text>
            <text x="50%" y="50%" class="text-base phase2-white-stroke auto-text"></text>
        </g>
    </svg>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Read URL Parameters
            const urlParams = new URLSearchParams(window.location.search);
            const userText = urlParams.get('text') || "BIG\nCAT";
            const canvasW = parseFloat(urlParams.get('w')) || 1920;
            const canvasH = parseFloat(urlParams.get('h')) || 1080;

            // Set dynamic canvas size
            const svg = document.getElementById('main-svg');
            svg.setAttribute('viewBox', `0 0 ${canvasW} ${canvasH}`);
            svg.style.width = `${canvasW}px`;
            svg.style.height = `${canvasH}px`;

            // Smart Multiline Text Engine
            const lines = userText.split('\n');
            const textElements = document.querySelectorAll('.auto-text');
            const emSpacing = 0.85; // Scales spacing perfectly relative to font-size

            textElements.forEach(el => {
                el.innerHTML = ''; 
                lines.forEach((line, index) => {
                    const tspan = document.createElementNS('http://www.w3.org/2000/svg', 'tspan');
                    tspan.textContent = line;
                    tspan.setAttribute('x', '50%');
                    if (index === 0) {
                        // Mathematically perfectly centers the block no matter how many lines!
                        const offset = -((lines.length - 1) * emSpacing) / 2;
                        tspan.setAttribute('dy', `${offset}em`);
                    } else {
                        tspan.setAttribute('dy', `${emSpacing}em`);
                    }
                    el.appendChild(tspan);
                });
            });

            // Wait for fonts to load, then calculate the exact bounding box for animations
            document.fonts.ready.then(() => {
                const fillText = document.querySelector('.phase2-fill');
                const box = fillText.getBBox();

                // 1. Map absolute gradients exactly to the custom text size
                document.getElementById('p2-stroke-grad').setAttribute('y1', box.y + box.height);
                document.getElementById('p2-stroke-grad').setAttribute('y2', box.y);
                
                document.getElementById('p2-fill-grad').setAttribute('y1', box.y);
                document.getElementById('p2-fill-grad').setAttribute('y2', box.y + box.height);
                
                const pat = document.getElementById('palm-pattern');
                pat.setAttribute('y', box.y);
                pat.setAttribute('width', canvasW);
                pat.setAttribute('height', box.height);
                
                const img = document.getElementById('palm-img');
                img.setAttribute('width', canvasW);
                img.setAttribute('height', box.height);

                // 2. Build SMIL Animations dynamically based on the text height
                const rootStyles = getComputedStyle(document.documentElement);
                const p1Dur = parseFloat(rootStyles.getPropertyValue('--phase1-duration')); 
                const p2Dur = parseFloat(rootStyles.getPropertyValue('--phase2-duration')); 
                const p3Dur = parseFloat(rootStyles.getPropertyValue('--phase3-duration')); 
                const p2Start = p1Dur;
                const p3Start = p1Dur + p2Dur;

                const createAnim = (attr, from, to, dur, begin, calcMode = 'spline') => {
                    const anim = document.createElementNS('http://www.w3.org/2000/svg', 'animate');
                    anim.setAttribute('attributeName', attr);
                    anim.setAttribute('from', from);
                    anim.setAttribute('to', to);
                    anim.setAttribute('begin', begin);
                    anim.setAttribute('dur', `${dur}s`);
                    anim.setAttribute('fill', 'freeze');
                    anim.setAttribute('calcMode', calcMode);
                    if (calcMode === 'spline') {
                        anim.setAttribute('keyTimes', '0; 1');
                        anim.setAttribute('keySplines', '0.4 0 0.2 1'); 
                    }
                    return anim;
                };

                // PHASE 1: Cinematic Wipe
                const grad = document.getElementById('mask-grad');
                grad.appendChild(createAnim('y1', box.y - 1000, box.y + box.height + 200, p1Dur, 0));
                grad.appendChild(createAnim('y2', box.y - 500, box.y + box.height + 500, p1Dur, 0));

                // PHASE 2: Bottom-Up Bloom
                const fillRect = document.getElementById('fill-wipe-rect');
                fillRect.appendChild(createAnim('y', box.y + box.height + 200, box.y - 400, p2Dur, p2Start));

                // PHASE 3: Color Morph
                document.getElementById('stop-1').appendChild(createAnim('stop-color', '#3e0062', '#296cf1', p3Dur, p3Start, 'linear'));
                document.getElementById('stop-2').appendChild(createAnim('stop-color', '#f465bf', '#776add', p3Dur, p3Start, 'linear'));
                document.getElementById('stop-4').appendChild(createAnim('stop-color', '#f465bf', '#fed04a', p3Dur, p3Start, 'linear'));

                // PHASE 3: Palm Tree Reveal
                document.querySelectorAll('.phase3-palms').forEach(p => {
                    p.appendChild(createAnim('opacity', '0', '0.85', p3Dur, p3Start, 'linear'));
                });
            });
        });
    </script>
</body>
</html>
