<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTA 6 Stream Overlay Generator</title>
    <style>
        @font-face {
            font-family: 'GTA Art Deco';
            src: url('GTA Art Deco - Medium.ttf') format('truetype');
            font-weight: 900;
        }
        @font-face {
            font-family: 'GTA Art Deco';
            src: url('GTA Art Deco - Regular.ttf') format('truetype');
            font-weight: normal;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: #0d0015; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background-color: #1a002b; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(200, 0, 255, 0.2); width: 100%; max-width: 500px; border: 1px solid #c800ff; }
        h1 { text-align: center; color: #ffb300; font-family: 'GTA Art Deco', sans-serif; font-weight: 900; letter-spacing: 2px; }
        label { font-weight: bold; display: block; margin-top: 20px; color: #c800ff; }
        textarea, input, select { width: 100%; padding: 12px; margin-top: 8px; border-radius: 6px; border: 1px solid #3e0062; background-color: #0d0015; color: white; font-size: 16px; box-sizing: border-box; }
        textarea { font-family: 'GTA Art Deco', sans-serif; font-weight: 900; font-size: 24px; text-align: center; letter-spacing: 2px; }
        .row { display: flex; gap: 15px; }
        button { width: 100%; padding: 15px; margin-top: 30px; background: linear-gradient(90deg, #c800ff, #ffb300); border: none; border-radius: 6px; color: #000; font-weight: 900; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>GTA 6 OVERLAY GENERATOR</h1>
        <label>Enter Your Text</label>
        <textarea id="obs-text" rows="3">BIG&#10;CAT</textarea>
        
        <label>Select Font Style</label>
        <select id="obs-font" onchange="updatePreview()">
            <option value="GTA Art Deco">GTA Art Deco (Heavy)</option>
            <option value="Rommetto One">Rommetto One</option>
            <option value="Geist">Geist</option>
        </select>
        <div id="font-preview" style="margin-top:20px; padding:10px; border:1px dashed #c800ff; text-align:center; font-family: 'GTA Art Deco';">Preview</div>

        <div class="row">
            <div style="flex: 1;"><label>Width</label><input type="number" id="obs-w" value="1920"></div>
            <div style="flex: 1;"><label>Height</label><input type="number" id="obs-h" value="1080"></div>
        </div>
        <button onclick="generateLink()">GENERATE OBS LINK</button>
        <div class="output-box" style="margin-top:20px;"><label>OBS URL:</label><input type="text" id="output-url" readonly></div>
    </div>
    <script>
        function updatePreview() {
            const font = document.getElementById('obs-font').value;
            const preview = document.getElementById('font-preview');
            preview.style.fontFamily = font === 'GTA Art Deco' ? "'GTA Art Deco', sans-serif" : font;
        }
        function generateLink() {
            const text = document.getElementById('obs-text').value;
            const w = document.getElementById('obs-w').value;
            const h = document.getElementById('obs-h').value;
            const font = document.getElementById('obs-font').value;
            const baseUrl = window.location.href.split('?')[0].replace('index.html', '');
            document.getElementById('output-url').value = `${baseUrl}overlay.html?text=${encodeURIComponent(text)}&w=${w}&h=${h}&font=${encodeURIComponent(font)}`;
        }
    </script>
</body>
</html>
